services:

  mysql:
    image: mysql:8.0
    container_name: quizzsloth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: quizzsloth_db
      MYSQL_USER: administrador
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: quizzsloth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: administrador
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data

  odoo:
    image: odoo:17
    container_name: quizzsloth_odoo
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8069:8069"
    environment:
      HOST: postgres
      USER: administrador
      PASSWORD: 1234
    volumes:
      - odoo_data:/var/lib/odoo

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  odoo_data:
    driver: local
