services:

  mysql:
    image: mysql:8.0
    container_name: quizzsloth_mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: quizzsloth_db
      MYSQL_USER: administrador
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./tmp/quizsloth.sql:/docker-entrypoint-initdb.d/quizsloth.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: quizzsloth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: administrador
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data

  odoo:
    image: odoo:17
    container_name: quizzsloth_odoo
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8069:8069"
    environment:
      HOST: postgres
      USER: administrador
      PASSWORD: 1234
      ODOO_MASTER_PASSWORD: admin
    volumes:
      - odoo_data:/var/lib/odoo

  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: quizzsloth_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "4000:4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quizzsloth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true
      SPRING_DATASOURCE_USERNAME: administrador
      SPRING_DATASOURCE_PASSWORD: 1234
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    volumes:
      - uploads_data:/uploads

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  odoo_data:
    driver: local
  uploads_data:
    driver: local
